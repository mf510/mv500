    let userStats = JSON.parse(localStorage.getItem('mv500_stats')) || {};
    let currentMode = { lv: 100, view: 'list' };

function showLevelList(lv, view = 'list') {
        currentMode = { lv: lv, view: view };
        // 修正箇所：タイトルをシンプルに統合
        let html = `<h3>Lv${lv} ${levels[lv]}</h3>`;
        
        if (view === 'list') {
            // level-desc の要素は削除しました
            allVerbs.filter(v => v.lv === lv).forEach(v => {
                const s = userStats[v.id] || '';
                html += `<div class="card">
                    <div class="verb-header">${v.id}. ${v.base}</div>
                    <span class="conj-text">(${v.conj})</span>
                    <div class="example-line">
                        <span class="example-text">${v.ex}</span>
                        <div class="action-group">
                            <div class="eval-btns">
                                <button class="${s==='✕'?'active':''}" onclick="toggleEval(${v.id}, '✕')">✕</button>
                                <button class="${s==='△'?'active':''}" onclick="toggleEval(${v.id}, '△')">△</button>
                                <button class="${s==='◯'?'active':''}" onclick="toggleEval(${v.id}, '◯')">◯</button>
                            </div>
                            <button class="ja-btn" onclick="toggleJa(${v.id})">和訳</button>
                        </div>
                    </div>
                    <div id="ja-${v.id}" class="ja">${v.trans}</div>
                </div>`;
            });
        } else {
            // 一覧表示時も同じタイトルが出るようにします
            allVerbs.filter(v => v.lv === lv).forEach(v => {
                html += `<div class="list-item">${v.id}. ${v.base}</div>`;
            });
        }
        document.getElementById('wordList').innerHTML = html;
        updateStatsDisplay();
    }

    function toggleView(lv) {
        if (currentMode.lv === lv && currentMode.view === 'index') showLevelList(lv, 'list');
        else showLevelList(lv, 'index');
    }

    function toggleEval(id, status) {
        if (userStats[id] === status) delete userStats[id];
        else userStats[id] = status;
        localStorage.setItem('mv500_stats', JSON.stringify(userStats));
        showLevelList(currentMode.lv, 'list');
    }

    function updateStatsDisplay() {
        let counts = { '✕': 0, '△': 0, '◯': 0 };
        Object.values(userStats).forEach(s => { if(counts[s] !== undefined) counts[s]++; });
        const done = Object.keys(userStats).length;
        document.getElementById('statusBox').innerHTML = `
            <div class="status-btn" style="color:#fd9644;">✕ ${counts['✕']}</div>
            <div class="status-btn" style="color:#2ed573;">△ ${counts['△']}</div>
            <div class="status-btn" style="color:#70a1ff;">◯ ${counts['◯']}</div>
            <div class="status-btn" style="color:#ff4757;">未 ${allVerbs.length - done}</div>
        `;
    }

    function toggleJa(id) {
        const el = document.getElementById('ja-' + id);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    function showHelp() { alert("使い方：Lvボタンで詳細学習、？で一覧表示。再度？で詳細学習に戻ります。評価ボタンはトグル式で、押すごとに記録/未評価が切り替わります。"); }

    [100, 200, 300, 400, 500].forEach(l => {
        document.getElementById('levelGrid').innerHTML += `<div class="level-col">
            <button style="background:var(--lv${l/100});" onclick="showLevelList(${l}, 'list')">Lv${l}</button>
            <button class="hint-btn" onclick="toggleView(${l})">?</button>
        </div>`;
    });
    
    showLevelList(100);
</script>
